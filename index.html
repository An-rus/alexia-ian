<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Alexia — AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #C82909;
      --orange-dim: #cc3d00;
      --red: #C0392B;
      --orange-glow: rgba(255, 77, 0, 0.35);
      --gray-dark: #0e0e0e;
      --gray-mid: #1a1a1a;
      --gray-panel: #141414;
      --gray-border: #2a2a2a;
      --gray-text: #888;
      --white: #f0f0f0;
      --font-display: 'Orbitron', monospace;
      --font-body: 'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--gray-dark);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 16px;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,77,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,77,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .app-shell {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100vw;
    }

    /* ===== HEADER ===== */
    .mobile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--gray-panel);
      border-bottom: 1px solid var(--gray-border);
      flex-shrink: 0;
      position: relative;
    }

    .mobile-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      height: 2px; width: 100%;
      background: linear-gradient(to right, var(--orange), var(--red), transparent);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-ring {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px var(--orange-glow);
      animation: pulse-ring 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 12px var(--orange-glow); }
      50% { box-shadow: 0 0 22px var(--orange-glow); }
    }

    .logo-inner {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 900;
      color: var(--orange);
    }

    .brand-text { display: flex; flex-direction: column; }

    .brand-name {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--white);
    }

    .brand-tag {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--orange);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--gray-text);
      letter-spacing: 1px;
    }

    .clear-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--gray-border);
      color: var(--gray-text);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .clear-btn:active {
      border-color: var(--red);
      color: var(--red);
      background: rgba(192,57,43,0.08);
    }

    /* ===== STATUS BAR ===== */
    .status-bar {
      display: flex;
      gap: 16px;
      padding: 6px 16px;
      background: var(--gray-dark);
      border-bottom: 1px solid var(--gray-border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .status-bar::-webkit-scrollbar { display: none; }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--gray-text);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gray-border);
      flex-shrink: 0;
    }

    .dot.active {
      background: var(--orange);
      box-shadow: 0 0 5px var(--orange-glow);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== MESSAGES ===== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .messages::-webkit-scrollbar { display: none; }

    .message {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fade-up 0.3s ease forwards;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 4px;
      border: 1px solid var(--orange);
      background: rgba(255,77,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      flex-shrink: 0;
    }

    .user-avatar {
      border-color: var(--gray-border);
      background: var(--gray-mid);
      color: var(--gray-text);
    }

    .bubble {
      max-width: 78%;
      background: var(--gray-panel);
      border: 1px solid var(--gray-border);
      border-radius: 2px 8px 8px 8px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      position: relative;
    }

    .bubble::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 24px; height: 2px;
      background: var(--orange);
    }

    .message.user .bubble {
      border-radius: 8px 2px 8px 8px;
      background: rgba(255,77,0,0.07);
      border-color: rgba(255,77,0,0.25);
    }

    .message.user .bubble::before {
      left: auto; right: 0;
      background: var(--red);
    }

    .sender-name {
      font-family: var(--font-display);
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--orange);
      font-weight: 600;
    }

    .message.user .sender-name { color: var(--red); text-align: right; }

    .bubble p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--white);
    }

    .typing-bubble {
      flex-direction: row !important;
      align-items: center;
      gap: 6px;
      padding: 14px 16px;
      min-width: 56px;
    }

    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange);
      display: block;
    }

    .dot-1 { animation: bounce 1.2s ease-in-out infinite 0s; }
    .dot-2 { animation: bounce 1.2s ease-in-out infinite 0.2s; }
    .dot-3 { animation: bounce 1.2s ease-in-out infinite 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-4px); opacity: 1; }
    }

    /* ===== INPUT ===== */
    .input-area {
      padding: 10px 12px 20px;
      border-top: 1px solid var(--gray-border);
      background: var(--gray-panel);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--gray-mid);
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color 0.2s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--orange);
      box-shadow: 0 0 10px rgba(255,77,0,0.15);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 100px;
      -webkit-appearance: none;
    }

    textarea::placeholder { color: #444; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 6px;
      border: none;
      background: var(--orange);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(255,77,0,0.3);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s ease;
    }

    .send-btn:active { transform: scale(0.93); background: var(--orange-dim); }
    .send-btn:disabled { opacity: 0.4; }

    .input-hint {
      margin-top: 6px;
      font-size: 10px;
      color: #333;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="scanline"></div>

  <div class="app-shell">

    <header class="mobile-header">
      <div class="header-brand">
        <div class="logo-ring">
          <div class="logo-inner">A</div>
        </div>
        <div class="brand-text">
          <span class="brand-name">ALEXIA</span>
          <span class="brand-tag">v2.1 — ONLINE</span>
        </div>
      </div>
      <div class="header-right">
        <span id="clock" class="clock"></span>
        <button class="clear-btn" onclick="clearChat()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Limpiar
        </button>
      </div>
    </header>

    <div class="status-bar">
      <div class="status-item"><span class="dot active"></span>Sistema activo</div>
      <div class="status-item"><span class="dot"></span>Chroma DB</div>
    </div>

    <div class="messages" id="messages">
      <div class="message alexia">
        <div class="avatar">A</div>
        <div class="bubble">
          <span class="sender-name">ALEXIA</span>
          <p>Hola, soy yo, tu novia bot fav, como has estado?</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="Escribe tu mensaje..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()" id="sendBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
    </div>

  </div>

  <script>
    const API_URL = 'https://alexia-ian-production.up.railway.app/chat';

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('es-MX', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendMessage(text, role) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'alexia') {
        div.innerHTML = `<div class="avatar">A</div><div class="bubble"><span class="sender-name">ALEXIA</span><p>${text}</p></div>`;
      } else {
        div.innerHTML = `<div class="bubble"><span class="sender-name">TÚ</span><p>${text}</p></div><div class="avatar user-avatar">T</div>`;
      }
      msgs.appendChild(div);
      scrollBottom();
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message alexia';
      div.id = 'typing';
      div.innerHTML = `<div class="avatar">A</div><div class="bubble typing-bubble"><span class="dot-1"></span><span class="dot-2"></span><span class="dot-3"></span></div>`;
      msgs.appendChild(div);
      scrollBottom();
    }

    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;
      appendMessage(escapeHtml(text), 'user');
      showTyping();
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensaje: text })
        });
        const data = await res.json();
        hideTyping();
        appendMessage(escapeHtml(data.respuesta), 'alexia');
      } catch (err) {
        hideTyping();
        appendMessage('⚠ Error de conexión con el servidor.', 'alexia');
      }
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    function clearChat() {
      document.getElementById('messages').innerHTML = '';
      appendMessage('Conversación reiniciada. ¿En qué puedo ayudarte?', 'alexia');
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }
  </script>
</body>
</html>
