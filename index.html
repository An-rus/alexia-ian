!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alexia — AI</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="scanline"></div>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo-block">
        <div class="logo-ring">
          <div class="logo-inner">A</div>
        </div>
        <span class="logo-name">ALEXIA</span>
        <span class="logo-tag">v2.1 — ONLINE</span>
      </div>

      <div class="status-block">
        <div class="status-row">
          <span class="dot active"></span>
          <span>Sistema activo</span>
        </div>
        <div class="status-row">
          <span class="dot"></span>
          <span>Chroma DB cargada</span>
        </div>
        <div class="status-row">
          <span class="dot"></span>
          <span>Gemini 2.5 Flash</span>
        </div>
      </div>

      <div class="divider"></div>

      <button class="clear-btn" onclick="clearChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Limpiar conversación
      </button>
    </aside>

    <!-- MAIN CHAT -->
    <main class="chat-area">

      <header class="chat-header">
        <div class="header-left">
          <span class="header-title">CHAT</span>
          <span class="header-sub">Conversación en tiempo real</span>
        </div>
        <div class="header-right">
          <span id="clock" class="clock"></span>
        </div>
      </header>

      <div class="messages" id="messages">
        <div class="message alexia">
          <div class="avatar">A</div>
          <div class="bubble">
            <span class="sender-name">ALEXIA</span>
            <p>Hola, soy Alexia. Estoy lista para ayudarte. ¿En qué puedo asistirte hoy?</p>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="Escribe tu mensaje..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" onclick="sendMessage()" id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
      </div>

    </main>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('es-MX', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendMessage(text, role) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'alexia') {
        div.innerHTML = `<div class="avatar">A</div><div class="bubble"><span class="sender-name">ALEXIA</span><p>${text}</p></div>`;
      } else {
        div.innerHTML = `<div class="bubble"><span class="sender-name">TÚ</span><p>${text}</p></div><div class="avatar user-avatar">T</div>`;
      }
      msgs.appendChild(div);
      scrollBottom();
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message alexia';
      div.id = 'typing';
      div.innerHTML = `<div class="avatar">A</div><div class="bubble typing-bubble"><span class="dot-1"></span><span class="dot-2"></span><span class="dot-3"></span></div>`;
      msgs.appendChild(div);
      scrollBottom();
    }

    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;
      appendMessage(escapeHtml(text), 'user');
      showTyping();
      try {
        const res = await fetch('http://localhost:8000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensaje: text })
        });
        const data = await res.json();
        hideTyping();
        appendMessage(escapeHtml(data.respuesta), 'alexia');
      } catch (err) {
        hideTyping();
        appendMessage('⚠ Error de conexión. Verifica que el servidor esté activo en puerto 8000.', 'alexia');
      }
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    function clearChat() {
      document.getElementById('messages').innerHTML = '';
      appendMessage('Conversación reiniciada. ¿En qué puedo ayudarte?', 'alexia');
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }
  </script>
</body>
</html>
